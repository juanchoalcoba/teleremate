<!doctype html>
<html lang="en">
  <head>
    <script>
      if (window.location.pathname.startsWith('/backoffice')) {
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = '/manifest-admin.json';
        link.id = 'admin-manifest';
        document.head.appendChild(link);
        
        const observer = new MutationObserver(() => {
          document.querySelectorAll('link[rel="manifest"]').forEach(node => {
            if (node.id !== 'admin-manifest') node.remove();
          });
        });
        observer.observe(document.head, { childList: true, subtree: true });
        setTimeout(() => observer.disconnect(), 2000);
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/iconodefin.png" />
    <link rel="apple-touch-icon" href="/iconodefin.png" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeleRemate • Subastas Online</title>
    <link rel="canonical" href="https://teleremate-front.vercel.app/" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
