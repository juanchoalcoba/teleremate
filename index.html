<!doctype html>
<html lang="en">
  <head>
    <script>
      window.__pwaInstallPrompt = window.__pwaInstallPrompt || null;

      window.addEventListener('beforeinstallprompt', (e) => {
        const isAdminPath = window.location.pathname.startsWith('/backoffice');
        if (!isAdminPath) {
          e.preventDefault();
          window.__pwaInstallPrompt = e;
        }
      });

      // 🔥 FIX CLAVE SÍNCRONO: Interceptar manifest antes del parsing heurístico de Chrome
      (function() {
        if (window.location.pathname.startsWith('/backoffice')) {
          var observer = new MutationObserver(function(mutations) {
            for (var i = 0; i < mutations.length; i++) {
              for (var j = 0; j < mutations[i].addedNodes.length; j++) {
                var node = mutations[i].addedNodes[j];
                if (node.tagName === 'LINK' && node.rel === 'manifest') {
                  node.href = '/manifest-admin.json';
                  observer.disconnect();
                }
              }
            }
          });
          observer.observe(document.documentElement, { childList: true, subtree: true });
          
          window.addEventListener('DOMContentLoaded', function() {
            var m = document.querySelector('link[rel="manifest"]');
            if (m) {
              m.href = '/manifest-admin.json';
            } else {
              var link = document.createElement('link');
              link.rel = 'manifest';
              link.href = '/manifest-admin.json';
              document.head.appendChild(link);
            }
          });
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/iconodefin.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/iconodefin.png" />
    <link rel="apple-touch-icon" href="/iconodefin.png" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeleRemate • Subastas Online</title>
    <meta name="description" content="TeleRemate Uruguay. La plataforma más confiable para subastas locales. Fácil, seguro y totalmente transparente. Años de experiencia." />
    <link rel="canonical" id="canonical-tag" href="https://teleremate.org/" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
