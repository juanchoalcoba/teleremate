<!doctype html>
<html lang="en">
  <head>
    <script>
      // 1. Manejo simple del aviso de instalación
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        if (!window.location.pathname.startsWith('/backoffice')) {
          e.preventDefault();
          window.__pwaInstallPrompt = e;
        }
      });

      // 2. Inyección estática del manifiesto según la ruta de entrada
      (function() {
        var isAdm = window.location.pathname.startsWith('/backoffice');
        var m = document.createElement('link');
        m.rel = 'manifest';
        m.href = isAdm ? '/manifest-admin.json' : '/manifest.webmanifest';
        document.head.appendChild(m);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/iconodefin.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/iconodefin.png" />
    <link rel="apple-touch-icon" href="/iconodefin.png" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeleRemate • Subastas Online</title>
    <meta name="description" content="TeleRemate Uruguay. La plataforma más confiable para subastas locales. Fácil, seguro y totalmente transparente. Años de experiencia." />
    <link rel="canonical" id="canonical-tag" href="https://teleremate.org/" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
